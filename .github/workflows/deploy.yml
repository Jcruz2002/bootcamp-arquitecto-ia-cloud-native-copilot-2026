name: Deploy Multi-Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod
      skip-tests:
        description: 'Skip running tests'
        required: false
        type: boolean
        default: false

jobs:
  # Build stage - runs tests and builds the application
  build:
    name: Build and Test
    uses: ./.github/workflows/build.yml
    with:
      checkout-ref: ${{ github.ref }}

  # Deploy to target environment with approval gates
  deploy-dev:
    name: Deploy to Development
    if: |
      github.event.inputs.environment == 'dev' ||
      github.event.inputs.environment == 'stage' ||
      github.event.inputs.environment == 'prod'
    needs: [build]
    uses: ./.github/workflows/helm-deploy.yml
    with:
      environment: dev
      helm-release-name: enrollmenthub
      helm-chart-path: infra/helm/app
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZ_RG: ${{ secrets.AZ_RG }}
      AZ_AKS: ${{ secrets.AZ_AKS }}

  deploy-stage:
    name: Deploy to Staging
    if: |
      (github.event.inputs.environment == 'stage' ||
       github.event.inputs.environment == 'prod') &&
      success()
    needs: [build, deploy-dev]
    uses: ./.github/workflows/helm-deploy.yml
    with:
      environment: stage
      helm-release-name: enrollmenthub
      helm-chart-path: infra/helm/app
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZ_RG: ${{ secrets.AZ_RG }}
      AZ_AKS: ${{ secrets.AZ_AKS }}

  deploy-prod:
    name: Deploy to Production
    if: |
      github.event.inputs.environment == 'prod' &&
      success()
    needs: [build, deploy-stage]
    uses: ./.github/workflows/helm-deploy.yml
    with:
      environment: prod
      helm-release-name: enrollmenthub
      helm-chart-path: infra/helm/app
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZ_RG: ${{ secrets.AZ_RG }}
      AZ_AKS: ${{ secrets.AZ_AKS }}
