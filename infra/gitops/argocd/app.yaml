apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: enrollmenthub
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/OWNER/REPO.git
    targetRevision: main
    path: infra/helm/app
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated: { selfHeal: true, prune: true }
