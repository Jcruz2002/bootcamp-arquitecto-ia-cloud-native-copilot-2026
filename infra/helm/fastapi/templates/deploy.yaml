apiVersion: apps/v1
kind: Deployment
metadata: { name: fastapi }
spec:
  replicas: 1
  selector: { matchLabels: { app: fastapi } }
  template:
    metadata: { labels: { app: fastapi } }
    spec:
      containers:
      - name: api
        image: {{ .Values.image }}
        ports: [{containerPort: {{ .Values.port }} }]
