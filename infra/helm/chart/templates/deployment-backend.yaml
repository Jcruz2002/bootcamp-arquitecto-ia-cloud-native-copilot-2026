
apiVersion: apps/v1
kind: Deployment
metadata: { name: api-dotnet }
spec:
  replicas: 2
  selector: { matchLabels: { app: api-dotnet } }
  template:
    metadata: { labels: { app: api-dotnet } }
    spec:
      containers:
      - name: api
        image: {{ .Values.backend.image }}
        ports: [{containerPort: 8080}]
