apiVersion: apps/v1
kind: Deployment
metadata: { name: angular }
spec:
  replicas: 1
  selector: { matchLabels: { app: angular } }
  template:
    metadata: { labels: { app: angular } }
    spec:
      containers:
      - name: web
        image: {{ .Values.image }}
        ports: [{containerPort: {{ .Values.port }} }]
