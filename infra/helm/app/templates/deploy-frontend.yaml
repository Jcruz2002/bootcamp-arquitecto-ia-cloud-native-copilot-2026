apiVersion: apps/v1
kind: Deployment
metadata: { name: app-next }
spec:
  replicas: 2
  selector: { matchLabels: { app: app-next } }
  template:
    metadata: { labels: { app: app-next } }
    spec:
      containers:
      - name: web
        image: {{ .Values.frontend.image }}
        ports: [{containerPort: 3000}]
