apiVersion: v1
kind: Service
metadata: { name: app-next }
spec:
  selector: { app: app-next }
  ports: [{ port: {{ .Values.service.port }}, targetPort: 3000 }]
---
apiVersion: v1
kind: Service
metadata: { name: api-dotnet }
spec:
  selector: { app: api-dotnet }
  ports: [{ port: {{ .Values.service.port }}, targetPort: 8080 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: enrollmenthub
  annotations: { kubernetes.io/ingress.class: nginx }
spec:
  rules:
  - host: app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend: { service: { name: app-next, port: { number: 80 } } }
      - path: /api
        pathType: Prefix
        backend: { service: { name: api-dotnet, port: { number: 80 } } }
