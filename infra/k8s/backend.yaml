
apiVersion: apps/v1
kind: Deployment
metadata: { name: api-dotnet }
spec:
  replicas: 2
  selector: { matchLabels: { app: api-dotnet } }
  template:
    metadata: { labels: { app: api-dotnet } }
    spec:
      containers:
      - name: api
        image: ghcr.io/OWNER/dotnet10-api:latest
        ports: [{containerPort: 8080}]
        readinessProbe:
          httpGet: { path: /health, port: 8080 }
          initialDelaySeconds: 5
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: api-dotnet }
spec:
  selector: { app: api-dotnet }
  ports: [{ port: 80, targetPort: 8080 }]
