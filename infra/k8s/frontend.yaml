
apiVersion: apps/v1
kind: Deployment
metadata: { name: app-next }
spec:
  replicas: 2
  selector: { matchLabels: { app: app-next } }
  template:
    metadata: { labels: { app: app-next } }
    spec:
      containers:
      - name: web
        image: ghcr.io/OWNER/next16-app:latest
        ports: [{containerPort: 3000}]
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: app-next }
spec:
  selector: { app: app-next }
  ports: [{ port: 80, targetPort: 3000 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: course-app
  annotations: { kubernetes.io/ingress.class: nginx }
spec:
  rules:
  - host: app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend: { service: { name: app-next, port: { number: 80 } } }
      - path: /api
        pathType: Prefix
        backend: { service: { name: api-dotnet, port: { number: 80 } } }
